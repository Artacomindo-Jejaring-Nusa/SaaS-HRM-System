# ============================================================
# HRMS Narwasthu Group - Docker Compose (Enterprise Stack)
# ============================================================
# Services: Backend (Laravel), Frontend (Next.js), MySQL, Redis, Nginx Proxy
# ============================================================

services:
  # ── MySQL Master (Writes) ──────────────────────────────────
  mysql-master:
    image: mysql:8.4
    container_name: hrms-mysql-master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HrmsN@rwasthu2026!}
      MYSQL_DATABASE: ${DB_DATABASE:-hrm_saas}
      MYSQL_USER: ${DB_USERNAME:-hrms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-HrmsSecure2026!}
    command: 
      - "--server-id=1"
      - "--log-bin=mysql-bin"
      - "--binlog-format=ROW"
      - "--enforce-gtid-consistency=ON"
      - "--gtid-mode=ON"
      - "--mysql-native-password=ON"
      - "--bind-address=0.0.0.0"
    ports:
      - "${DB_PORT_EXPOSE:-3306}:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-HrmsN@rwasthu2026!}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── MySQL Slave (Reads) ──────────────────────────────────
  mysql-slave:
    image: mysql:8.4
    container_name: hrms-mysql-slave
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HrmsN@rwasthu2026!}
    command:
      - "--server-id=2"
      - "--log-bin=mysql-bin"
      - "--relay-log=mysql-relay-bin"
      - "--binlog-format=ROW"
      - "--read-only=1"
      - "--enforce-gtid-consistency=ON"
      - "--gtid-mode=ON"
      - "--mysql-native-password=ON"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./docker/mysql/init-slave.sql:/docker-entrypoint-initdb.d/01-init-slave.sql:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - hrms-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-HrmsRedis2026!} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT_EXPOSE:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-HrmsRedis2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Backend 1 (Laravel API) ──────────────────────────────────
  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend1
    restart: unless-stopped
    environment:
      APP_NAME: HRMS
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-base64:uk0t72Xm52XfN84TBJEPc1Ku98c29PsluiEKm+kl3Jw=}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql-master
      DB_READ_HOST: mysql-slave
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hrm_saas}
      DB_USERNAME: ${DB_USERNAME:-hrms_user}
      DB_PASSWORD: ${DB_PASSWORD:-HrmsSecure2026!}
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-HrmsRedis2026!}
      REDIS_PORT: 6379
      FILESYSTEM_DISK: local
      MAIL_MAILER: smtp
      MAIL_HOST: ${MAIL_HOST:-mail.narwastuarthatama.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-no_replay@narwastuarthatama.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-satlink2020}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no_replay@narwastuarthatama.com}
      MAIL_FROM_NAME: "HRMS Narwastu Arthatama"
      FIREBASE_CREDENTIALS: storage/app/firebase-auth.json
      BCRYPT_ROUNDS: 12
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      REVERB_APP_ID: ${REVERB_APP_ID:-856423}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-vbovvxvpylkuw8p9x3lp}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-m6uom8x89mizl9n5p30h}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-1015918555814-0qod31fvuc96odo10a2uqmppoqf9vegi.apps.googleusercontent.com}
    volumes:
      - ./backend/storage/app/public:/var/www/html/storage/app/public
      - ./backend/storage/logs:/var/www/html/storage/logs
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - hrms-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Backend 2 (Laravel API - Failover) ───────────────────────
  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend2
    restart: unless-stopped
    environment:
      APP_NAME: HRMS
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-base64:uk0t72Xm52XfN84TBJEPc1Ku98c29PsluiEKm+kl3Jw=}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql-master
      DB_READ_HOST: mysql-slave
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hrm_saas}
      DB_USERNAME: ${DB_USERNAME:-hrms_user}
      DB_PASSWORD: ${DB_PASSWORD:-HrmsSecure2026!}
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-HrmsRedis2026!}
      REDIS_PORT: 6379
      FILESYSTEM_DISK: local
      MAIL_MAILER: smtp
      MAIL_HOST: ${MAIL_HOST:-mail.narwastuarthatama.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-no_replay@narwastuarthatama.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-satlink2020}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no_replay@narwastuarthatama.com}
      MAIL_FROM_NAME: "HRMS Narwastu Arthatama"
      FIREBASE_CREDENTIALS: storage/app/firebase-auth.json
      BCRYPT_ROUNDS: 12
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      REVERB_APP_ID: ${REVERB_APP_ID:-856423}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-vbovvxvpylkuw8p9x3lp}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-m6uom8x89mizl9n5p30h}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-1015918555814-0qod31fvuc96odo10a2uqmppoqf9vegi.apps.googleusercontent.com}
    volumes:
      - ./backend/storage/app/public:/var/www/html/storage/app/public
      - ./backend/storage/logs:/var/www/html/storage/logs
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - hrms-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Reverb Server (Websockets) ─────────────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-reverb
    command: php artisan reverb:start --host="0.0.0.0" --port=8080
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: ${APP_ENV:-production}
      SKIP_MIGRATIONS: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql-master
      DB_READ_HOST: mysql-slave
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hrm_saas}
      DB_USERNAME: ${DB_USERNAME:-hrms_user}
      DB_PASSWORD: ${DB_PASSWORD:-HrmsSecure2026!}
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-HrmsRedis2026!}
      REVERB_APP_ID: ${REVERB_APP_ID:-856423}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-vbovvxvpylkuw8p9x3lp}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-m6uom8x89mizl9n5p30h}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      REVERB_HOST: ${REVERB_HOST:-0.0.0.0}
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - hrms-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "php -r \"@fsockopen('localhost', 8080) or exit(1);\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend (Next.js Dashboard) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: hrms-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NODE_ENV: production
    depends_on:
      - backend1
      - backend2
      - mysql-master
    networks:
      - hrms-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: hrms-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
      - "8000:8000"
      - "3000:3000"
    volumes:
      - ./docker/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - frontend
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

# ── Volumes ────────────────────────────────────────────────
volumes:
  mysql_master_data:
    driver: local
  mysql_slave_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  hrms-network:
    driver: bridge
    name: hrms-network
