sonar.projectKey=ontime-hrms
sonar.projectName=ontime-hrms
sonar.projectVersion=1.0

# Host dan Kredensial Akses
sonar.host.url=http://localhost:9000
sonar.token=sqp_6001ff99a90eca4a9271b18a2bfbdfa1c87a59a0

# Direktori utama yang akan di-scan (Backend, Frontend, Mobile)
sonar.sources=backend/app,frontend/src,mobile/lib

# Pengecualian folder yang berat dan tidak perlu di-scan (seperti library pihak ketiga)
sonar.exclusions=**/vendor/**,**/node_modules/**,**/.next/**,**/build/**,**/.dart_tool/**,**/public/**,**/storage/**,**/*.test.tsx,**/*.spec.tsx,**/*.test.ts,**/*.spec.ts,**/*Test.php

# Menentukan folder pengujian
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=**/*Test.php,**/*.test.tsx,**/*.spec.tsx,**/*.test.ts,**/*.spec.ts

# Path Laporan Coverage
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
