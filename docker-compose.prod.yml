services:
  # ── Backend 1 (Laravel) ───────────────────────────
  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend1
    restart: always
    env_file: .env.prod
    environment:
      DB_READ_HOST: mysql-slave
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage/app/public
      - backend_logs:/var/www/html/storage/logs
    networks:
      - hrms-network

  # ── Backend 2 (Laravel - Failover) ────────────────
  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend2
    restart: always
    env_file: .env.prod
    environment:
      DB_READ_HOST: mysql-slave
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage/app/public
      - backend_logs:/var/www/html/storage/logs
    networks:
      - hrms-network

  # ── Reverb Server (WebSockets) ─────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-reverb
    command: php artisan reverb:start --host="0.0.0.0" --port=8080
    restart: always
    env_file: .env.prod
    environment:
      SKIP_MIGRATIONS: "true"
      DB_READ_HOST: mysql-slave
    ports:
      - "8080:8080"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - hrms-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "php -r \"@fsockopen('localhost', 8080) or exit(1);\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── Frontend (Next.js) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://ontime.jelantik.com/api
    container_name: hrms-frontend
    restart: always
    env_file: .env.prod
    depends_on:
      - backend1
      - backend2
    networks:
      - hrms-network

  # ── MySQL Master (Writes) ──────────────────────────────────
  mysql-master:
    image: mysql:8.4
    container_name: hrms-mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-OnTimeNarwastugo2026}
      MYSQL_DATABASE: ${DB_DATABASE:-hrm_saas}
      MYSQL_USER: ${DB_USERNAME:-hrms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-OnTimeNarwastugo2026}
    command: 
      - "--server-id=1"
      - "--log-bin=mysql-bin"
      - "--binlog-format=ROW"
      - "--enforce-gtid-consistency=ON"
      - "--gtid-mode=ON"
      - "--mysql-native-password=ON"
      - "--bind-address=0.0.0.0"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-OnTimeNarwastugo2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  # ── MySQL Slave (Reads) ──────────────────────────────────
  mysql-slave:
    image: mysql:8.4
    container_name: hrms-mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-OnTimeNarwastugo2026}
    command:
      - "--server-id=2"
      - "--log-bin=mysql-bin"
      - "--relay-log=mysql-relay-bin"
      - "--read-only=1"
      - "--enforce-gtid-consistency=ON"
      - "--gtid-mode=ON"
      - "--mysql-native-password=ON"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./docker/mysql/init-slave.sql:/docker-entrypoint-initdb.d/01-init-slave.sql:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-OnTimeNarwastugo2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-OnTimeNarwastugo2026}"]
    volumes:
      - redis_data:/data
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-OnTimeNarwastugo2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Gateway ─────────────────────────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: hrms-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend1
      - backend2
    networks:
      - hrms-network

  # ── Monitoring Agents (Exporters) ─────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: hrms-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - hrms-network

  mysql-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: hrms-mysql-exporter
    restart: always
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${DB_PASSWORD:-OnTimeNarwastugo2026}
    command:
      - "--mysqld.address=mysql-master:3306"
      - "--mysqld.username=hrms_user"
      - "--no-collect.slave_status"
    ports:
      - "9104:9104"
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - hrms-network

networks:
  hrms-network:
    external: true
    name: hrms-network

volumes:
  mysql_master_data:
    external: true
    name: saas-hrm-system_mysql_master_data
  mysql_slave_data:
    external: true
    name: saas-hrm-system_mysql_slave_data
  redis_data:
    external: true
    name: saas-hrm-system_redis_data
  backend_storage:
    external: true
    name: saas-hrm-system_backend_storage
  backend_logs:
    external: true
    name: saas-hrm-system_backend_logs
