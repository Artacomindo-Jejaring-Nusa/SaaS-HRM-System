# ================================================
# HRMS Narwasthu Group - Reverse Proxy Config
# ================================================

# Upstream definitions
upstream backend_upstream {
    server hrms-backend1:80 max_fails=1 fail_timeout=2s;
    server hrms-backend2:80 max_fails=1 fail_timeout=2s;
    keepalive 32;
}

upstream frontend_upstream {
    server hrms-frontend:3000;
    keepalive 16;
}

# ── Main entrypoint (port 80) ───────────────────────────────
server {
    listen 80;
    server_name _;

    client_max_body_size 64M;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: wss: data: blob:;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check for proxy itself
    location = /health {
        access_log off;
        return 200 '{"status":"proxy_healthy"}';
        add_header Content-Type application/json;
    }

    # Block cgi-bin
    location ^~ /cgi-bin/ {
        deny all;
        return 404;
    }

    # Route API requests to Laravel backend
    location /api {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_buffering off;
    }

    # Route storage requests to Laravel backend
    location /storage {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Route Reverb WebSocket requests
    location /app {
        proxy_pass http://hrms-reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_connect_timeout 60;
        proxy_send_timeout 3600; # Keep connection alive
        proxy_read_timeout 3600;
    }

    # Everything else goes to Next.js frontend
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── Backend Direct Access (port 8000) ────────────────────────
server {
    listen 8000;
    server_name _;

    location / {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        client_max_body_size 55M;
    }
}

# ── Frontend Direct Access (port 3000) ───────────────────────
server {
    listen 3000;
    server_name _;

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
# ── Reverb WebSocket (port 8080) ──────────────────────────
server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass http://hrms-reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
    }
}
